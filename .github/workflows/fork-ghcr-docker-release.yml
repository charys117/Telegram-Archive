name: Fork GHCR Docker Release

on:
  push:
    branches:
      - build/ghcr-workflow

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-viewer:
    name: Build viewer image
    if: github.repository == 'charys117/Telegram-Archive'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve build ref
        id: ref
        run: |
          echo "short_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build viewer smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.viewer
          load: true
          tags: telegram-archive-viewer:smoke
          cache-from: type=gha,scope=fork-ghcr-viewer
          cache-to: type=gha,mode=max,scope=fork-ghcr-viewer

      - name: Smoke test viewer imports
        run: |
          docker run --rm --entrypoint python telegram-archive-viewer:smoke -c "import src.web.main"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract viewer metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/telegram-archive-viewer
          tags: |
            type=raw,value=fork-${{ steps.ref.outputs.short_sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.ref.outputs.sha }}

      - name: Build and publish viewer image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.viewer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fork-ghcr-viewer
          cache-to: type=gha,mode=max,scope=fork-ghcr-viewer

      - name: Summarize viewer image
        run: |
          {
            echo "### Viewer image"
            echo
            echo "Built ref: \`${{ steps.ref.outputs.sha }}\`"
            echo
            echo "Published tags:"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

  build-archive:
    name: Build archive image
    if: github.repository == 'charys117/Telegram-Archive'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve build ref
        id: ref
        run: |
          echo "short_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build archive smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: telegram-archive:smoke
          cache-from: type=gha,scope=fork-ghcr-archive
          cache-to: type=gha,mode=max,scope=fork-ghcr-archive

      - name: Smoke test archive imports
        run: |
          docker run --rm --entrypoint python telegram-archive:smoke -m src --help
          docker run --rm --entrypoint python telegram-archive:smoke -c "import src.telegram_backup; import src.listener; import src.db.adapter"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract archive metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/telegram-archive
          tags: |
            type=raw,value=fork-${{ steps.ref.outputs.short_sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.ref.outputs.sha }}

      - name: Build and publish archive image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fork-ghcr-archive
          cache-to: type=gha,mode=max,scope=fork-ghcr-archive

      - name: Summarize archive image
        run: |
          {
            echo "### Archive image"
            echo
            echo "Built ref: \`${{ steps.ref.outputs.sha }}\`"
            echo
            echo "Published tags:"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"
